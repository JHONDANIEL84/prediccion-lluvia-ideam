version: "3.9"

services:

  # =========================================
  # SERVICIO STREAMLIT
  # =========================================
  streamlit:
    build: .
    container_name: lluvia_app
    ports:
      - "8501:8501"
    depends_on:
      - mlflow
    volumes:
      - ./mlruns:/app/mlruns                 # Logs de MLflow
      - ./:/app                               # Monta tu código local (solo desarrollo)
    # Comando con hot reload para desarrollo
    command: streamlit run app.py \
             --server.port 8501 \
             --server.address 0.0.0.0 \
             --server.fileWatcherType=watchdog

  # =========================================
  # SERVICIO MLFLOW
  # =========================================
  mlflow:
    image: python:3.11-slim
    container_name: mlflow_server
    working_dir: /mlflow
    command: >
      bash -c "pip install mlflow && 
      mlflow ui --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns